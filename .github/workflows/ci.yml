name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  lint:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/mlc_config.json'
        continue-on-error: true

      - name: Validate evolution structure
        run: |
          echo "=== Checking evolution directory structure ==="
          required_dirs=(
            "evolution/feedback"
            "evolution/instincts"
            "evolution/instincts/archived"
            "evolution/metrics"
            "evolution/skill-drafts"
            "evolution/retrospectives"
          )
          for dir in "${required_dirs[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "❌ Missing required directory: $dir"
              exit 1
            fi
            echo "✅ $dir"
          done

          # Check _index.md exists
          if [ ! -f "evolution/_index.md" ]; then
            echo "❌ Missing evolution/_index.md"
            exit 1
          fi
          echo "✅ evolution/_index.md"

          # Check README exists
          if [ ! -f "evolution/README.md" ]; then
            echo "❌ Missing evolution/README.md"
            exit 1
          fi
          echo "✅ evolution/README.md"

          echo ""
          echo "=== Evolution structure valid ==="

      - name: Validate instinct frontmatter
        run: |
          echo "=== Checking instinct file format ==="
          errors=0
          for f in evolution/instincts/*.md; do
            [ "$f" = "evolution/instincts/*.md" ] && break
            if ! head -1 "$f" | grep -q "^---"; then
              echo "❌ $f: Missing YAML frontmatter"
              errors=$((errors + 1))
            else
              # Check required fields
              for field in confidence source_count category; do
                if ! grep -q "^${field}:" "$f"; then
                  echo "⚠️  $f: Missing field '$field'"
                fi
              done
              echo "✅ $f"
            fi
          done
          if [ "$errors" -gt 0 ]; then
            echo "❌ $errors instinct files have format errors"
            exit 1
          fi
          echo "=== All instinct files valid ==="

      - name: Check feedback format
        run: |
          echo "=== Checking feedback files ==="
          for f in evolution/feedback/*.md; do
            [ "$f" = "evolution/feedback/*.md" ] && break
            # Feedback files should have required sections
            if ! grep -q "Outcome" "$f"; then
              echo "⚠️  $f: Missing 'Outcome' field"
            fi
            echo "✅ $f"
          done
          echo "=== Feedback check complete ==="

  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      - name: Discover test files
        id: discover-tests
        run: |
          mapfile -t test_files < <(find . -type f -name 'test_*.py' | sort)
          if [ "${#test_files[@]}" -eq 0 ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "summary=No test_*.py files found." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          printf '%s\n' "${test_files[@]}" > .pytest-files.txt
          {
            echo "found=true"
            echo "summary<<EOF"
            printf 'Ran pytest against:\n'
            printf '%s\n' "${test_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run pytest
        id: pytest
        if: steps.discover-tests.outputs.found == 'true'
        continue-on-error: true
        run: |
          mapfile -t test_files < .pytest-files.txt
          if pytest "${test_files[@]}"; then
            echo "status=success" >> "$GITHUB_OUTPUT"
          else
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Comment pytest result on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          TESTS_FOUND: ${{ steps.discover-tests.outputs.found }}
          TEST_SUMMARY: ${{ steps.discover-tests.outputs.summary }}
          PYTEST_STATUS: ${{ steps.pytest.outputs.status }}
        with:
          script: |
            const marker = '<!-- python-test-report -->';
            const body = process.env.TESTS_FOUND === 'true'
              ? `${marker}
            ## Python Test Report
            Status: ${process.env.PYTEST_STATUS === 'success' ? 'PASS' : 'FAIL'}

            ${process.env.TEST_SUMMARY}`
              : `${marker}
            ## Python Test Report
            Status: SKIPPED

            No \`test_*.py\` files were found in the repository.`;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Fail if pytest failed
        if: steps.discover-tests.outputs.found == 'true' && steps.pytest.outputs.status != 'success'
        run: exit 1

  pr-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR diff size
        run: |
          ADDITIONS=$(git diff --numstat origin/main...HEAD | awk '{s+=$1} END {print s+0}')
          DELETIONS=$(git diff --numstat origin/main...HEAD | awk '{s+=$2} END {print s+0}')
          TOTAL=$((ADDITIONS + DELETIONS))
          echo "📊 PR Stats: +$ADDITIONS / -$DELETIONS (total: $TOTAL lines)"
          if [ "$TOTAL" -gt 2000 ]; then
            echo "⚠️  Large PR ($TOTAL lines). Consider splitting."
          fi
