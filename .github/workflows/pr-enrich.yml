name: PR Enrich

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  enrich:
    name: Label and Check PR
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels and evolution warning
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- evolution-index-warning -->';
            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;
            const managedLabels = {
              evolution: '0e8a16',
              tooling: '1d76db',
              docs: '5319e7',
              python: '3572A5',
            };

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: issue_number,
              per_page: 100,
            });

            const names = files.map((file) => file.filename);
            const labels = new Set();

            if (names.some((name) => name.startsWith('evolution/'))) {
              labels.add('evolution');
            }
            if (names.some((name) => name.startsWith('scripts/'))) {
              labels.add('tooling');
            }
            if (names.some((name) => name.startsWith('docs/'))) {
              labels.add('docs');
            }
            if (names.some((name) => name.endsWith('.py'))) {
              labels.add('python');
            }

            if (labels.size > 0) {
              const existingLabels = await github.paginate(github.rest.issues.listLabelsForRepo, {
                owner,
                repo,
                per_page: 100,
              });
              const existingNames = new Set(existingLabels.map((label) => label.name));

              for (const label of labels) {
                if (!existingNames.has(label)) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: label,
                    color: managedLabels[label],
                  });
                }
              }

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels: [...labels],
              });
            }

            const addedFeedbackFile = files.some((file) =>
              file.status === 'added' &&
              /^evolution\/feedback\/[^/]+\.md$/.test(file.filename)
            );
            const indexUpdated = names.includes('evolution/_index.md');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body.includes(marker));

            if (addedFeedbackFile && !indexUpdated) {
              const body = `${marker}
            Warning: this PR adds a new file under \`evolution/feedback/\` but does not update \`evolution/_index.md\`.`;

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } else if (existing) {
              await github.rest.issues.deleteComment({
                owner,
                repo,
                comment_id: existing.id,
              });
            }
